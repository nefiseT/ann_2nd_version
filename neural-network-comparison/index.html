<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; text-align: center; font-size: 2em; }
        .controls { background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="range"], input[type="number"], button { padding: 8px 12px; border-radius: 4px; border: 1px solid #475569; background: #334155; color: #e2e8f0; }
        button { cursor: pointer; background: #3b82f6; border: none; font-weight: 600; }
        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        .models-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .model-card { background: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .model-card.tensorflow { border-left-color: #f59e0b; }
        h2 { margin-bottom: 15px; font-size: 1.3em; }
        canvas { border: 1px solid #475569; border-radius: 4px; display: block; margin-bottom: 15px; background: #0f172a; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9em; }
        .stat-item { padding: 10px; background: #0f172a; border-radius: 4px; }
        .stat-label { font-weight: 600; color: #94a3b8; }
        .stat-value { color: #10b981; font-weight: 700; margin-top: 3px; }
        .comparison { background: #1e293b; padding: 20px; border-radius: 8px; }
        .comparison h3 { margin-bottom: 15px; }
        .insight { padding: 10px; background: #0f172a; border-left: 3px solid #8b5cf6; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Neural Network Comparison</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Dataset Size: <span id="datasetSizeDisplay">500</span></label>
                <input type="range" id="datasetSize" min="100" max="2000" value="500" step="100">
            </div>
            <div class="control-group">
                <label>Learning Rate: <span id="learningRateDisplay">0.1</span></label>
                <input type="range" id="learningRate" min="0.001" max="0.5" value="0.1" step="0.01">
            </div>
            <div class="control-group">
                <label>Hidden Layer Size: <span id="hiddenSizeDisplay">8</span></label>
                <input type="range" id="hiddenSize" min="4" max="32" value="8" step="1">
            </div>
            <div class="control-group">
                <label>Epochs: <span id="epochsDisplay">100</span></label>
                <input type="range" id="epochs" min="10" max="500" value="100" step="10">
            </div>
            <button id="trainButton">🚀 Train Both Models</button>
            <button id="resetButton">↻ Reset</button>
        </div>

        <div class="models-container">
            <div class="model-card">
                <h2>Manual Neural Network</h2>
                <canvas id="canvasManual" width="400" height="400"></canvas>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Final Loss</div>
                        <div class="stat-value" id="manualLoss">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Accuracy</div>
                        <div class="stat-value" id="manualAccuracy">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Training Time</div>
                        <div class="stat-value" id="manualTime">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Epochs Trained</div>
                        <div class="stat-value" id="manualEpochs">0</div>
                    </div>
                </div>
            </div>

            <div class="model-card tensorflow">
                <h2>TensorFlow.js</h2>
                <canvas id="canvasTensorFlow" width="400" height="400"></canvas>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">Final Loss</div>
                        <div class="stat-value" id="tfLoss">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Accuracy</div>
                        <div class="stat-value" id="tfAccuracy">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Training Time</div>
                        <div class="stat-value" id="tfTime">—</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Epochs Trained</div>
                        <div class="stat-value" id="tfEpochs">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="comparison">
            <h3>📊 Comparison & Insights</h3>
            <div id="comparisonText"></div>
        </div>
    </div>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    
    <!-- Our modules -->
    <script src="src/utils/math.js"></script>
    <script src="src/utils/dataset.js"></script>
    <script src="src/utils/metrics.js"></script>
    <script src="src/models/ManualNN.js"></script>
    <script src="src/models/TensorFlowNN.js"></script>
    <script src="src/ui/canvas.js"></script>
    <script src="src/ui/controls.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
